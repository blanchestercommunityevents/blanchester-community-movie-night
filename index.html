<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blanchester Community Events</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #fff7e6, #f3d8b6);
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      color: #2f2f2f;
    }

    .message-box {
      width: 100%;
      max-width: 750px;
      padding: 55px 30px;
      background-color: rgba(255, 255, 255, 0.92);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 1.2;
    }
  </style>
</head>

<body>
  <main class="message-box">
    <h1>Blanchester Community Events<br />Coming Soon</h1>
  </main>
</body>
</html>
